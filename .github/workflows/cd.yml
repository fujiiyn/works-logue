name: CD

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-northeast1
  AR_REPO: works-logue
  API_IMAGE: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/works-logue/api
  WEB_IMAGE: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/works-logue/web

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -f infra/api/Dockerfile -t ${{ env.API_IMAGE }}:${{ github.sha }} -t ${{ env.API_IMAGE }}:latest .
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy works-logue-api \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="\
          DATABASE_URL=${{ secrets.DATABASE_URL }},\
          SUPABASE_URL=${{ secrets.SUPABASE_URL }},\
          SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }},\
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},\
          CORS_ORIGINS=https://works-logue-web-369619150476.asia-northeast1.run.app"

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push Web image
        run: |
          docker build -f infra/web/Dockerfile \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=https://works-logue-api-369619150476.asia-northeast1.run.app \
            -t ${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WEB_IMAGE }}:latest .
          docker push ${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WEB_IMAGE }}:latest

      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy works-logue-web \
            --image=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3
